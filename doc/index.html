<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Lab Pro - Advanced Sync</title>
    <style>
        :root { 
            --bg: #0b0e14; --card: #151921; --accent: #00f2ff; --accent-dark: #0088cc;
            --text: #e1e4e8; --border: #2d333b; --raw: #ff4757; --filt: #2ed573; --bypass: #ffa502;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; line-height: 1.5; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h2 { margin: 0 0 20px 0; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; color: #8b949e; border-bottom: 1px solid var(--border); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .grid { display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        canvas { width: 100%; height: 180px; background: #05070a; border-radius: 8px; border: 1px solid #1f242c; display: block; }
        
        /* TELEMETRY */
        .telemetry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .tel-card { background: #05070a; border-radius: 8px; padding: 15px; border-top: 3px solid #ccc; }
        .tel-card.raw { border-color: var(--raw); box-shadow: inset 0 0 15px rgba(255, 71, 87, 0.1); }
        .tel-card.filt { border-color: var(--filt); box-shadow: inset 0 0 15px rgba(46, 213, 115, 0.1); }
        .tel-label { font-size: 0.65rem; font-weight: bold; color: #8b949e; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .tel-value { font-family: 'Courier New', monospace; font-size: 2.2rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

        /* PIPELINE */
        .pipeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .pipeline { display: flex; flex-direction: column; gap: 12px; }
        .node { background: #1c2128; border: 1px solid var(--border); border-radius: 8px; padding: 12px; transition: transform 0.2s; }
        .node:hover { border-color: #444; }
        
        .node-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .node-title { font-size: 0.7rem; font-weight: bold; color: var(--accent); }
        
        /* CONTROLS */
        .control-group { display: flex; align-items: center; gap: 10px; }
        .num-box { display: flex; align-items: center; background: #000; border-radius: 4px; border: 1px solid var(--border); overflow: hidden; }
        .num-box input { width: 55px; background: none; border: none; color: #fff; text-align: center; padding: 5px; font-family: monospace; }
        .num-box button { background: #30363d; border: none; color: white; padding: 5px 10px; cursor: pointer; font-weight: bold; }
        .num-box button:hover { background: #444; }

        .btn { cursor: pointer; border-radius: 6px; font-weight: bold; transition: all 0.2s; border: none; font-size: 0.75rem; padding: 8px 12px; }
        .btn-add { width: 100%; background: #238636; color: white; margin-top: 10px; }
        .btn-add:hover { background: #2ea043; }
        .btn-bypass { background: #30363d; color: #fff; }
        .btn-bypass.active { background: var(--bypass); color: #000; }
        .btn-mute { background: #30363d; color: #fff; }
        .btn-mute.active { background: var(--raw); }

        input[type="range"] { flex: 1; accent-color: var(--accent); cursor: pointer; }
        select { background: #0d1117; color: white; border: 1px solid var(--border); border-radius: 4px; padding: 5px; font-size: 0.8rem; }
        
        #overlay { position: fixed; inset: 0; background: rgba(5,7,10,0.98); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #startBtn { padding: 20px 60px; background: var(--accent); color: #000; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; border: none; box-shadow: 0 0 30px rgba(0,242,255,0.3); }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="letter-spacing: 5px; margin-bottom: 30px;">SIGNAL LAB PRO</h1>
    <button id="startBtn">INITIALIZE ENGINE</button>
</div>

<div class="container">
    <div class="section">
        <h2>
            AUDIO ANALYZER
            <div style="display:flex; gap:10px">
                <button class="btn btn-bypass" id="audioBypassBtn" onclick="toggleBypass('audio')">BYPASS FILTERS</button>
                <button class="btn btn-mute" id="audioMute">MUTE OUTPUT</button>
            </div>
        </h2>
        <div class="grid">
            <div class="vis">
                <canvas id="audioCanvas"></canvas>
                <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
                    <div class="control-group"><span style="width:100px; font-size:0.75rem">Oscillator (Hz)</span> <input type="range" id="intFreq" min="20" max="2000" value="440" oninput="syncGlobal('intFreq', this.value)"> <div class="num-box"><button onclick="spinGlobal('intFreq', -10)">-</button><input type="number" id="intFreqNum" value="440" oninput="syncGlobal('intFreq', this.value)"><button onclick="spinGlobal('intFreq', 10)">+</button></div></div>
                    <div class="control-group"><span style="width:100px; font-size:0.75rem">Osc. Gain</span> <input type="range" id="intAmp" min="0" max="1" step="0.01" value="0.2" oninput="syncGlobal('intAmp', this.value)"> <div class="num-box"><button onclick="spinGlobal('intAmp', -0.05)">-</button><input type="number" id="intAmpNum" value="0.2" oninput="syncGlobal('intAmp', this.value)"><button onclick="spinGlobal('intAmp', 0.05)">+</button></div></div>
                </div>
            </div>
            <div class="pipeline-container">
                <div class="pipeline" id="audioNodes"></div>
                <button class="btn btn-add" onclick="addNode('audio')">+ ADD PROCESSING STAGE</button>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>PRECISION SENSOR TELEMETRY <button class="btn btn-bypass" id="sensorBypassBtn" onclick="toggleBypass('sensor')">BYPASS FILTERS</button></h2>
        <div class="grid">
            <div class="vis">
                <div class="telemetry-grid">
                    <div class="tel-card raw"><span class="tel-label">Raw Signal</span><span class="tel-value" id="valRaw">0.000</span></div>
                    <div class="tel-card filt"><span class="tel-label">Filtered Output</span><span class="tel-value" id="valFilt">0.000</span></div>
                </div>
                <canvas id="sensorCanvas"></canvas>
                <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
                    <div class="control-group"><span style="width:100px; font-size:0.75rem">Jitter Amp</span> <input type="range" id="sensorNoise" min="0" max="1" step="0.01" value="0.3" oninput="syncGlobal('sensorNoise', this.value)"> <div class="num-box"><button onclick="spinGlobal('sensorNoise', -0.05)">-</button><input type="number" id="sensorNoiseNum" value="0.3" oninput="syncGlobal('sensorNoise', this.value)"><button onclick="spinGlobal('sensorNoise', 0.05)">+</button></div></div>
                    <div class="control-group"><span style="width:100px; font-size:0.75rem">Sim Speed</span> <input type="range" id="simSpeed" min="1" max="100" value="20" oninput="syncGlobal('simSpeed', this.value)"> <div class="num-box"><button onclick="spinGlobal('simSpeed', -1)">-</button><input type="number" id="simSpeedNum" value="20" oninput="syncGlobal('simSpeed', this.value)"><button onclick="spinGlobal('simSpeed', 1)">+</button></div></div>
                </div>
            </div>
            <div class="pipeline-container">
                <div class="pipeline" id="sensorNodes"></div>
                <button class="btn btn-add" onclick="addNode('sensor')">+ ADD FILTER STAGE</button>
            </div>
        </div>
    </div>
</div>

<script>
// --- LOGIC CLASSES ---
class LowPass { constructor(a=0.1){this.a=a;this.l=0;} calc(v){this.l=(1-this.a)*this.l+this.a*v; return this.l;}}
class HighPass { constructor(a=0.1){this.lp=new LowPass(a);} calc(v){return v-this.lp.calc(v);}}
class MovingAverage { constructor(n=10){this.n=Math.max(1,Math.round(n));this.b=[];} calc(v){this.b.push(v);if(this.b.length>this.n)this.b.shift();return this.b.reduce((a,b)=>a+b,0)/this.b.length;}}
class GainNode { constructor(g=1){this.g=g;} calc(v){return v*this.g;}}

// --- STATE ---
let audioCtx, analyser, isMuted=false, phase=0;
let audioChain=[], sensorChain=[];
let audioBypass=false, sensorBypass=false;
let sHistRaw=new Array(200).fill(0), sHistFilt=new Array(200).fill(0);
let lastRaw=0, lastFilt=0, updateDisplayFlag=false;

// --- CORE ENGINE ---
function init() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    const proc = audioCtx.createScriptProcessor(2048, 1, 1);
    
    proc.onaudioprocess = (e) => {
        const out = e.outputBuffer.getChannelData(0);
        const aFreq = parseFloat(document.getElementById('intFreq').value);
        const aAmp = parseFloat(document.getElementById('intAmp').value);
        const sNoise = parseFloat(document.getElementById('sensorNoise').value);
        const speed = Math.max(0.1, parseFloat(document.getElementById('simSpeed').value));
        const phaseStep = (2 * Math.PI * aFreq) / audioCtx.sampleRate;

        for (let i = 0; i < out.length; i++) {
            // Audio Signal Generation
            let aS = (Math.sin(phase) * aAmp); 
            phase += phaseStep; if(phase > Math.PI*2) phase -= Math.PI*2;
            
            // Audio Processing
            if(!audioBypass) audioChain.forEach(n => { if(n.inst) aS = n.inst.calc(aS); });
            out[i] = isMuted ? 0 : aS;

            // Sensor Logic (Decoupled frequency)
            if(i % (Math.floor(2048 / (speed * 0.5)) || 1) === 0) {
                lastRaw = Math.sin(Date.now()/500) + (Math.random()*2-1)*sNoise;
                lastFilt = lastRaw;
                if(!sensorBypass) sensorChain.forEach(n => { if(n.inst) lastFilt = n.inst.calc(lastFilt); });
                
                sHistRaw.push(lastRaw); sHistRaw.shift();
                sHistFilt.push(lastFilt); sHistFilt.shift();
                updateDisplayFlag = true;
            }
        }
    };
    proc.connect(analyser); analyser.connect(audioCtx.destination);
    loop();
}

// --- UI SYNC ---
function syncGlobal(id, val) {
    const slider = document.getElementById(id);
    const num = document.getElementById(id + 'Num');
    if(slider) slider.value = val;
    if(num) num.value = val;
}

function spinGlobal(id, delta) {
    const num = document.getElementById(id + 'Num');
    const newVal = parseFloat(num.value) + delta;
    syncGlobal(id, parseFloat(newVal.toFixed(2)));
}

function toggleBypass(type) {
    if(type === 'audio') {
        audioBypass = !audioBypass;
        document.getElementById('audioBypassBtn').classList.toggle('active', audioBypass);
    } else {
        sensorBypass = !sensorBypass;
        document.getElementById('sensorBypassBtn').classList.toggle('active', sensorBypass);
    }
}

// --- PIPELINE MGMT ---
function addNode(target) {
    const chain = target === 'audio' ? audioChain : sensorChain;
    const id = Date.now();
    chain.push({ id, type: 'lpass', p: [0.1], inst: new LowPass(0.1) });
    renderPipeline(target);
}

function updateNode(target, id, type, val, reRender=false) {
    const chain = target === 'audio' ? audioChain : sensorChain;
    const node = chain.find(n => n.id === id);
    if(type) node.type = type;
    if(val !== undefined) node.p[0] = parseFloat(val);
    
    // Instantiate Logic
    if(node.type === 'lpass') node.inst = new LowPass(node.p[0]);
    if(node.type === 'hpass') node.inst = new HighPass(node.p[0]);
    if(node.type === 'mavg')  node.inst = new MovingAverage(node.p[0]*100);
    if(node.type === 'gain')  node.inst = new GainNode(node.p[0]);

    // Update UI numbers/sliders without destroying the DOM
    const nodeEl = document.querySelector(`[data-id="${id}"]`);
    if(nodeEl) {
        nodeEl.querySelector('input[type="range"]').value = node.p[0];
        nodeEl.querySelector('.node-val').value = node.p[0];
    }
    if(reRender) renderPipeline(target);
}

function renderPipeline(target) {
    const chain = target === 'audio' ? audioChain : sensorChain;
    const cont = document.getElementById(target + 'Nodes');
    cont.innerHTML = '';
    chain.forEach((node, idx) => {
        const div = document.createElement('div');
        div.className = 'node';
        div.setAttribute('data-id', node.id);
        div.innerHTML = `
            <div class="node-top">
                <span class="node-title">STAGE ${idx+1}</span>
                <div style="display:flex; gap:5px">
                    <button class="btn" style="background:#2d333b" onclick="removeNode('${target}', ${node.id})">✕</button>
                </div>
            </div>
            <div class="control-group">
                <select onchange="updateNode('${target}', ${node.id}, this.value, null, true)">
                    <option value="lpass" ${node.type==='lpass'?'selected':''}>Low Pass</option>
                    <option value="hpass" ${node.type==='hpass'?'selected':''}>High Pass</option>
                    <option value="mavg" ${node.type==='mavg'?'selected':''}>Moving Avg</option>
                    <option value="gain" ${node.type==='gain'?'selected':''}>Gain/Scale</option>
                </select>
                <input type="range" min="0" max="1" step="0.01" value="${node.p[0]}" oninput="updateNode('${target}', ${node.id}, null, this.value)">
                <div class="num-box">
                    <button onclick="spinNode('${target}', ${node.id}, -0.05)">-</button>
                    <input type="number" class="node-val" value="${node.p[0]}" step="0.01" oninput="updateNode('${target}', ${node.id}, null, this.value)">
                    <button onclick="spinNode('${target}', ${node.id}, 0.05)">+</button>
                </div>
            </div>
        `;
        cont.appendChild(div);
    });
}

function spinNode(target, id, delta) {
    const chain = target === 'audio' ? audioChain : sensorChain;
    const node = chain.find(n => n.id === id);
    updateNode(target, id, null, (node.p[0] + delta).toFixed(2));
}

function removeNode(target, id) {
    if(target === 'audio') audioChain = audioChain.filter(n => n.id !== id);
    else sensorChain = sensorChain.filter(n => n.id !== id);
    renderPipeline(target);
}

// --- RENDER LOOP ---
document.getElementById('audioMute').onclick = function() { 
    isMuted = !isMuted; this.classList.toggle('active');
    this.innerText = isMuted ? "UNMUTE OUTPUT" : "MUTE OUTPUT";
};
document.getElementById('startBtn').onclick = () => { init(); document.getElementById('overlay').remove(); };

function loop() {
    const actx = document.getElementById('audioCanvas').getContext('2d');
    const sctx = document.getElementById('sensorCanvas').getContext('2d');
    const fData = new Uint8Array(analyser.frequencyBinCount);
    
    const render = () => {
        requestAnimationFrame(render);
        if(updateDisplayFlag) {
            document.getElementById('valRaw').innerText = lastRaw.toFixed(3);
            document.getElementById('valFilt').innerText = lastFilt.toFixed(3);
            updateDisplayFlag = false; 
        }

        // Render Audio Spectrum
        analyser.getByteFrequencyData(fData);
        actx.fillStyle='#05070a'; actx.fillRect(0,0,800,200);
        for(let i=0; i<fData.length; i++) {
            let h = (fData[i]/255)*180;
            actx.fillStyle = `hsl(${180+(fData[i]/3)}, 100%, 50%)`;
            actx.fillRect(i*3, 180-h, 2, h);
        }

        // Render Sensor Graph
        sctx.fillStyle='#05070a'; sctx.fillRect(0,0,400,200);
        sctx.strokeStyle='#1f242c'; sctx.beginPath(); sctx.moveTo(0,100); sctx.lineTo(400,100); sctx.stroke();
        
        const drawS = (data, col, width) => {
            sctx.beginPath(); sctx.strokeStyle=col; sctx.lineWidth=width;
            for(let i=0; i<200; i++) {
                let y = 100 - (data[i]*50);
                if(i===0) sctx.moveTo(i*2, y); else sctx.lineTo(i*2, y);
            }
            sctx.stroke();
        };
        drawS(sHistRaw, '#ff4757', 1);
        drawS(sHistFilt, '#2ed573', 2.5);
    };
    render();
}
</script>
</body>
</html>
