<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modular Filter Pipeline</title>
    <style>
        :root { --bg: #0f1115; --card: #1a1d23; --accent: #00f2ff; --text: #e0e6ed; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 95%; max-width: 1000px; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        
        /* Visuals */
        .visual-section { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #2d333d; }
        canvas { width: 100%; height: 300px; background: #000; border-radius: 8px; }

        /* Pipeline */
        .pipeline-section { background: var(--card); padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #2d333d; }
        .filter-node { background: #252a33; padding: 12px; border-radius: 8px; border-left: 4px solid var(--accent); position: relative; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        
        .node-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .remove-btn { background: #ff4d4d; color: white; border: none; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 12px; }
        
        /* Inputs */
        .input-group { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        input[type="range"] { flex: 1; accent-color: var(--accent); }
        input[type="number"], select { background: #121418; color: white; border: 1px solid #3d4451; padding: 5px; border-radius: 4px; font-size: 13px; }
        
        /* Global Controls */
        .global-controls { grid-column: 1 / -1; background: var(--card); padding: 15px; border-radius: 12px; display: flex; gap: 20px; align-items: center; border: 1px solid #2d333d; }
        
        .btn-add { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }
        #startBtn { padding: 15px 40px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 1.1rem; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; display:flex; justify-content:center; align-items:center;">
    <button id="startBtn">INITIALIZE SIGNAL CHAIN</button>
</div>

<div class="container">
    <div class="visual-section">
        <h3 style="margin-top:0">Real-Time Spectral Analysis</h3>
        <canvas id="visualizer"></canvas>
        <div class="input-group" style="margin-top:15px">
            <label>Master Output Gain:</label>
            <input type="range" id="masterGain" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <div class="pipeline-section">
        <h3 style="margin-top:0">Filter Pipeline</h3>
        <div id="pipelineNodes"></div>
        <button class="btn-add" id="addFilter">+ Add Filter Stage</button>
        <p style="font-size: 11px; color: #777;">Signal flows Top &rarr; Bottom</p>
    </div>

    <div class="global-controls">
        <div style="flex:1">
            <label style="font-size:12px; display:block">White Noise Level</label>
            <input type="range" id="noiseVol" min="0" max="0.5" step="0.01" value="0.1" style="width:100%">
        </div>
        <div style="flex:1">
            <label style="font-size:12px; display:block">Interference Freq (Hz)</label>
            <input type="number" id="intFreq" value="440" style="width:100%">
            <input type="range" id="intRange" min="20" max="5000" value="440" style="width:100%">
        </div>
    </div>
</div>

<script>
/** FILTER LOGIC PORTED FROM YOUR PYTHON CLASSES  **/
class LowPass {
    constructor(alpha) { this.alpha = alpha; this.lastVal = 0; }
    calc(v) { this.lastVal = (1 - this.alpha) * this.lastVal + this.alpha * v; return this.lastVal; }
}
class HighPass {
    constructor(alpha) { this.lpf = new LowPass(alpha); }
    calc(v) { return v - this.lpf.calc(v); }
}
class MovingAverage {
    constructor(n) { this.n = Math.max(1, Math.round(n)); this.buf = []; }
    calc(v) {
        this.buf.push(v);
        if(this.buf.length > this.n) this.buf.shift();
        return this.buf.reduce((a,b)=>a+b, 0) / this.buf.length;
    }
}
class BandPass {
    constructor(low, high) { this.lpf = new LowPass(low); this.hpf = new HighPass(high); }
    calc(v) { return this.hpf.calc(this.lpf.calc(v)); }
}
class Notch {
    constructor(low, high) { this.bpf = new BandPass(low, high); }
    calc(v) { return v - this.bpf.calc(v); }
}

// Global Engine State
let audioCtx, analyser, osc, noiseGainNode, outGainNode;
let activePipeline = []; // Holds objects: { id, type, params[], instances[] }

function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const processor = audioCtx.createScriptProcessor(2048, 1, 1);
    
    osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    oscGain.gain.value = 0.1;
    
    noiseGainNode = audioCtx.createGain();
    noiseGainNode.gain.value = 0.1;

    analyser = audioCtx.createAnalyser();
    outGainNode = audioCtx.createGain();
    outGainNode.gain.value = 0.5;

    processor.onaudioprocess = (e) => {
        let input = e.inputBuffer.getChannelData(0);
        let output = e.outputBuffer.getChannelData(0);
        let nVol = noiseGainNode.gain.value;

        for (let i = 0; i < input.length; i++) {
            let sample = input[i] + (Math.random() * 2 - 1) * nVol;
            
            // PIPE THROUGH THE CUSTOM CHAIN
            for (let node of activePipeline) {
                if(node.instance) {
                    sample = node.instance.calc(sample);
                }
            }
            output[i] = sample;
        }
    };

    osc.connect(oscGain); oscGain.connect(processor);
    processor.connect(analyser); analyser.connect(outGainNode);
    outGainNode.connect(audioCtx.destination);
    osc.start();
    draw();
}

// UI Management
let nodeIdCounter = 0;
const pipelineContainer = document.getElementById('pipelineNodes');

function addFilterNode() {
    const id = nodeIdCounter++;
    const nodeDiv = document.createElement('div');
    nodeDiv.className = 'filter-node';
    nodeDiv.id = `node-${id}`;
    nodeDiv.innerHTML = `
        <div class="node-header">
            <select class="type-sel">
                <option value="lpass">Low Pass</option>
                <option value="hpass">High Pass</option>
                <option value="mavg">Moving Avg</option>
                <option value="bpass">Band Pass</option>
                <option value="notch">Notch</option>
            </select>
            <button class="remove-btn" onclick="removeNode(${id})">X</button>
        </div>
        <div class="inputs-container"></div>
    `;
    pipelineContainer.appendChild(nodeDiv);
    
    const nodeData = { id, type: 'lpass', params: [0.1, 0.5], instance: null };
    activePipeline.push(nodeData);

    const typeSel = nodeDiv.querySelector('.type-sel');
    typeSel.onchange = (e) => { nodeData.type = e.target.value; renderNodeInputs(id); };
    
    renderNodeInputs(id);
}

function renderNodeInputs(id) {
    const node = activePipeline.find(n => n.id === id);
    const container = document.querySelector(`#node-${id} .inputs-container`);
    container.innerHTML = '';

    const createInput = (label, index, isInt = false) => {
        const div = document.createElement('div');
        div.className = 'input-group';
        const step = isInt ? 1 : 0.0001;
        const min = isInt ? 1 : 0.0001;
        const max = isInt ? 1000 : 1.0;
        
        div.innerHTML = `
            <label style="font-size:10px; width:40px">${label}</label>
            <input type="range" min="${min}" max="${max}" step="${step}" value="${node.params[index]}">
            <input type="number" min="${min}" max="${max}" step="${step}" value="${node.params[index]}" style="width:60px">
        `;
        
        const r = div.querySelector('input[type="range"]');
        const n = div.querySelector('input[type="number"]');
        const update = (val) => {
            node.params[index] = parseFloat(val);
            r.value = val; n.value = val;
            rebuildInstance(node);
        };
        r.oninput = (e) => update(e.target.value);
        n.oninput = (e) => update(e.target.value);
        container.appendChild(div);
    };

    if (node.type === 'lpass' || node.type === 'hpass') {
        createInput('α', 0);
    } else if (node.type === 'mavg') {
        createInput('N', 0, true);
    } else {
        createInput('Low α', 0);
        createInput('High α', 1);
    }
    rebuildInstance(node);
}

function rebuildInstance(node) {
    const p = node.params;
    if (node.type === 'lpass') node.instance = new LowPass(p[0]);
    if (node.type === 'hpass') node.instance = new HighPass(p[0]);
    if (node.type === 'mavg')  node.instance = new MovingAverage(p[0]);
    if (node.type === 'bpass') node.instance = new BandPass(p[0], p[1]);
    if (node.type === 'notch') node.instance = new Notch(p[0], p[1]);
}

window.removeNode = (id) => {
    activePipeline = activePipeline.filter(n => n.id !== id);
    document.getElementById(`node-${id}`).remove();
};

// Global Events
document.getElementById('addFilter').onclick = addFilterNode;
document.getElementById('startBtn').onclick = () => {
    initAudio();
    document.getElementById('overlay').remove();
};

const syncGlobal = (rId, nId, cb) => {
    const r = document.getElementById(rId);
    const n = document.getElementById(nId);
    r.oninput = (e) => { n.value = e.target.value; cb(e.target.value); };
    n.oninput = (e) => { r.value = e.target.value; cb(e.target.value); };
};

syncGlobal('intRange', 'intFreq', (v) => { if(osc) osc.frequency.value = v; });
document.getElementById('noiseVol').oninput = (e) => { if(noiseGainNode) noiseGainNode.gain.value = e.target.value; };
document.getElementById('masterGain').oninput = (e) => { if(outGainNode) outGainNode.gain.value = e.target.value; };

function draw() {
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    const data = new Uint8Array(analyser.frequencyBinCount);
    const render = () => {
        requestAnimationFrame(render);
        analyser.getByteFrequencyData(data);
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const bw = (canvas.width / data.length) * 2.5;
        let x = 0;
        for (let i = 0; i < data.length; i++) {
            let h = (data[i] / 255) * canvas.height;
            ctx.fillStyle = `hsl(${180 + (data[i]/2)}, 100%, 50%)`;
            ctx.fillRect(x, canvas.height - h, bw, h);
            x += bw + 1;
        }
    };
    render();
}
</script>
</body>
</html>
