<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal & Sensor Lab - Complete Edition</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --text: #c9d1d9; --border: #30363d; --mute: #f85149; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 25px; max-width: 1100px; margin-inline: auto; }
        h2 { margin: 0 0 15px 0; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        canvas { width: 100%; height: 200px; background: #000; border-radius: 6px; border: 1px solid #333; }
        .pipeline { display: flex; flex-direction: column; gap: 10px; max-height: 550px; overflow-y: auto; padding-right: 5px; }
        .node { background: #0d1117; border: 1px solid var(--border); border-left: 4px solid var(--accent); padding: 10px; border-radius: 6px; margin-bottom: 5px; }
        .node-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; font-size: 0.8rem; }
        .ctrl-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; font-size: 0.85rem; }
        .num-input-wrap { display: flex; align-items: center; background: #21262d; border-radius: 4px; border: 1px solid var(--border); overflow: hidden; }
        .num-input-wrap input { width: 70px; background: none; border: none; color: white; text-align: center; padding: 5px; font-family: monospace; }
        .spin { background: #30363d; color: white; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .spin:hover { background: #484f58; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-add { width: 100%; background: #238636; color: white; margin-top: 10px; }
        .btn-mute { background: #30363d; color: #fff; }
        .btn-mute.active { background: var(--mute); }
        #startBtn { padding: 20px 40px; background: var(--accent); color: #fff; font-size: 1.2rem; }
        input[type="range"] { flex: 1; accent-color: var(--accent); }
        .label-sm { font-size: 0.75rem; color: #8b949e; width: 100px; }
    </style>
</head>
<body>

<div id="overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:99; display:flex; justify-content:center; align-items:center;">
    <button id="startBtn" class="btn">START SIGNAL ENGINES</button>
</div>

<div class="section">
    <h2>1. Audio Lab <button class="btn btn-mute" id="audioMute">MUTE AUDIO</button></h2>
    <div class="grid">
        <div class="vis">
            <canvas id="audioCanvas"></canvas>
            <div class="ctrl-row">
                <span class="label-sm">Interf. (Hz)</span>
                <input type="range" id="intFreq" min="20" max="2000" value="440" oninput="syncGlobal('intFreq', this.value)">
                <div class="num-input-wrap">
                    <button class="spin" onclick="spinGlobal('intFreq', -10)">-</button>
                    <input type="number" id="intFreqNum" value="440" oninput="syncGlobal('intFreq', this.value)">
                    <button class="spin" onclick="spinGlobal('intFreq', 10)">+</button>
                </div>
            </div>
            <div class="ctrl-row">
                <span class="label-sm">Interf. Amp</span>
                <input type="range" id="intAmp" min="0" max="1" step="0.01" value="0.2" oninput="syncGlobal('intAmp', this.value)">
                <div class="num-input-wrap">
                    <button class="spin" onclick="spinGlobal('intAmp', -0.05)">-</button>
                    <input type="number" id="intAmpNum" value="0.2" oninput="syncGlobal('intAmp', this.value)">
                    <button class="spin" onclick="spinGlobal('intAmp', 0.05)">+</button>
                </div>
            </div>
            <div class="ctrl-row">
                <span class="label-sm">White Noise</span>
                <input type="range" id="audioNoise" min="0" max="1" step="0.01" value="0.1" oninput="syncGlobal('audioNoise', this.value)">
                <div class="num-input-wrap">
                    <button class="spin" onclick="spinGlobal('audioNoise', -0.01)">-</button>
                    <input type="number" id="audioNoiseNum" value="0.1" oninput="syncGlobal('audioNoise', this.value)">
                    <button class="spin" onclick="spinGlobal('audioNoise', 0.01)">+</button>
                </div>
            </div>
        </div>
        <div class="pipeline"><div id="audioNodes"></div><button class="btn btn-add" onclick="addNode('audio')">+ Add Filter</button></div>
    </div>
</div>

<div class="section">
    <h2>2. Sensor Lab</h2>
    <div class="grid">
        <div class="vis">
            <canvas id="sensorCanvas"></canvas>
            <div class="ctrl-row">
                <span class="label-sm">Sensor Amp</span>
                <input type="range" id="sensorAmp" min="0" max="2" step="0.05" value="0.5" oninput="syncGlobal('sensorAmp', this.value)">
                <div class="num-input-wrap">
                    <button class="spin" onclick="spinGlobal('sensorAmp', -0.1)">-</button>
                    <input type="number" id="sensorAmpNum" value="0.5" oninput="syncGlobal('sensorAmp', this.value)">
                    <button class="spin" onclick="spinGlobal('sensorAmp', 0.1)">+</button>
                </div>
            </div>
            <div class="ctrl-row">
                <span class="label-sm">Jitter</span>
                <input type="range" id="sensorNoise" min="0" max="1" step="0.01" value="0.3" oninput="syncGlobal('sensorNoise', this.value)">
                <div class="num-input-wrap">
                    <button class="spin" onclick="spinGlobal('sensorNoise', -0.05)">-</button>
                    <input type="number" id="sensorNoiseNum" value="0.3" oninput="syncGlobal('sensorNoise', this.value)">
                    <button class="spin" onclick="spinGlobal('sensorNoise', 0.05)">+</button>
                </div>
            </div>
            <div class="ctrl-row">
                <span class="label-sm">Sim Speed</span>
                <input type="range" id="simSpeed" min="1" max="100" value="20" oninput="syncGlobal('simSpeed', this.value)">
                <div class="num-input-wrap">
                    <button class="spin" onclick="spinGlobal('simSpeed', -1)">-</button>
                    <input type="number" id="simSpeedNum" value="20" oninput="syncGlobal('simSpeed', this.value)">
                    <button class="spin" onclick="spinGlobal('simSpeed', 1)">+</button>
                </div>
            </div>
        </div>
        <div class="pipeline"><div id="sensorNodes"></div><button class="btn btn-add" onclick="addNode('sensor')">+ Add Filter</button></div>
    </div>
</div>

<script>
class LowPass { constructor(a=0.1){this.a=a;this.l=0;} calc(v){this.l=(1-this.a)*this.l+this.a*v; return this.l;}}
class HighPass { constructor(a=0.1){this.lp=new LowPass(a);} calc(v){return v-this.lp.calc(v);}}
class MovingAverage { constructor(n=10){this.n=Math.max(1,Math.round(n));this.b=[];} calc(v){this.b.push(v);if(this.b.length>this.n)this.b.shift();return this.b.reduce((a,b)=>a+b,0)/this.b.length;}}
class BandPass { constructor(l,h){this.lp=new LowPass(l);this.hp=new HighPass(h);} calc(v){return this.hp.calc(this.lp.calc(v));}}
class Notch { constructor(l,h){this.bp=new BandPass(l,h);} calc(v){return v-this.bp.calc(v);}}
class HighCut { constructor(c){this.c=c;} calc(v){return Math.min(this.c,v);}}
class LowCut { constructor(c){this.c=c;} calc(v){return Math.max(this.c,v);}}

let audioCtx, analyser, audioChain=[], sensorChain=[], sHistRaw=new Array(200).fill(0), sHistFilt=new Array(200).fill(0), isMuted=false, phase=0;

function init() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    const proc = audioCtx.createScriptProcessor(2048, 1, 1);
    proc.onaudioprocess = (e) => {
        const out = e.outputBuffer.getChannelData(0);
        const aFreq = parseFloat(document.getElementById('intFreq').value);
        const aAmp = parseFloat(document.getElementById('intAmp').value);
        const aNoise = parseFloat(document.getElementById('audioNoise').value);
        const sAmp = parseFloat(document.getElementById('sensorAmp').value);
        const sNoise = parseFloat(document.getElementById('sensorNoise').value);
        const speed = Math.max(1, parseInt(document.getElementById('simSpeed').value));
        const phaseStep = (2 * Math.PI * aFreq) / audioCtx.sampleRate;

        for (let i = 0; i < out.length; i++) {
            // Audio Logic
            let aS = (Math.sin(phase) * aAmp) + ((Math.random()*2-1)*aNoise); 
            phase += phaseStep; if(phase > Math.PI*2) phase -= Math.PI*2;
            for(let n of audioChain) if(n.inst) aS = n.inst.calc(aS);
            out[i] = isMuted ? 0 : aS;

            // Sensor Logic
            if(i % (Math.floor(2048 / speed) || 1) === 0) {
                let raw = Math.sin(Date.now()/500)*sAmp + (Math.random()*2-1)*sNoise;
                let filt = raw;
                for(let n of sensorChain) if(n.inst) filt = n.inst.calc(filt);
                sHistRaw.push(raw); sHistRaw.shift();
                sHistFilt.push(filt); sHistFilt.shift();
            }
        }
    };
    proc.connect(analyser); analyser.connect(audioCtx.destination);
    loop();
}

function syncGlobal(id, val) {
    document.getElementById(id).value = val;
    document.getElementById(id + 'Num').value = val;
}

function spinGlobal(id, delta) {
    const num = document.getElementById(id + 'Num');
    const newVal = Math.max(0, parseFloat(num.value) + delta);
    syncGlobal(id, id === 'intFreq' ? Math.round(newVal) : parseFloat(newVal.toFixed(2)));
}

function syncNode(id, idx, val, target) {
    const chain = target === 'audio' ? audioChain : sensorChain;
    const node = chain.find(n => n.id === id);
    node.p[idx] = parseFloat(val);
    const row = document.getElementById(`inputs-${id}`).children[idx];
    row.querySelector('input[type="range"]').value = val;
    row.querySelector('input[type="number"]').value = val;
    const p = node.p;
    if(node.type==='lpass') node.inst = new LowPass(p[0]);
    if(node.type==='hpass') node.inst = new HighPass(p[0]);
    if(node.type==='mavg')  node.inst = new MovingAverage(p[0]);
    if(node.type==='bpass') node.inst = new BandPass(p[0], p[1]);
    if(node.type==='notch') node.inst = new Notch(p[0], p[1]);
    if(node.type==='hcut')  node.inst = new HighCut(p[0]);
    if(node.type==='lcut')  node.inst = new LowCut(p[0]);
}

function spinNode(id, idx, delta, target) {
    const node = (target==='audio'?audioChain:sensorChain).find(n=>n.id===id);
    const newVal = Math.max(0, parseFloat(node.p[idx]) + delta);
    syncNode(id, idx, newVal, target);
}

function addNode(target) {
    const id = Date.now();
    const div = document.createElement('div');
    div.className = 'node'; div.id = `node-${id}`;
    div.innerHTML = `<div class="node-header"><span>${target.toUpperCase()}</span>
        <select onchange="updateNodeType('${target}', ${id}, this.value)">
            <option value="lpass">Low Pass</option><option value="hpass">High Pass</option>
            <option value="mavg">Moving Avg</option><option value="bpass">Band Pass</option>
            <option value="notch">Notch</option><option value="hcut">High Cut</option><option value="lcut">Low Cut</option>
        </select>
        <button onclick="removeNode('${target}', ${id})" style="color:var(--mute); background:none; border:none; cursor:pointer;">✕</button>
    </div><div id="inputs-${id}"></div>`;
    document.getElementById(target+'Nodes').appendChild(div);
    (target==='audio'?audioChain:sensorChain).push({ id, type: 'lpass', p: [0.1, 0.5], inst: null });
    updateNodeType(target, id, 'lpass');
}

function updateNodeType(target, id, type) {
    const node = (target==='audio'?audioChain:sensorChain).find(n=>n.id===id);
    node.type = type;
    const cont = document.getElementById(`inputs-${id}`); cont.innerHTML = '';
    const mk = (lbl, idx, isInt=false) => {
        const row = document.createElement('div'); row.className = 'ctrl-row';
        const step = isInt ? 1 : 0.01;
        row.innerHTML = `<label style="width:50px; font-size:0.7rem">${lbl}</label>
            <input type="range" min="0" max="${isInt?200:2}" step="${step}" value="${node.p[idx]}" oninput="syncNode(${id}, ${idx}, this.value, '${target}')">
            <div class="num-input-wrap">
                <button class="spin" onclick="spinNode(${id}, ${idx}, -${step}, '${target}')">-</button>
                <input type="number" value="${node.p[idx]}" step="${step}" oninput="syncNode(${id}, ${idx}, this.value, '${target}')">
                <button class="spin" onclick="spinNode(${id}, ${idx}, ${step}, '${target}')">+</button>
            </div>`;
        cont.appendChild(row);
    };
    if(['lpass','hpass','hcut','lcut'].includes(type)) mk('Val', 0);
    else if(type==='mavg') mk('N', 0, true);
    else { mk('L-α', 0); mk('H-α', 1); }
    syncNode(id, 0, node.p[0], target);
}

function removeNode(t, id) {
    if(t==='audio') audioChain=audioChain.filter(n=>n.id!==id);
    else sensorChain=sensorChain.filter(n=>n.id!==id);
    document.getElementById(`node-${id}`).remove();
}

document.getElementById('audioMute').onclick = function() { 
    isMuted = !isMuted; this.classList.toggle('active');
    this.innerText = isMuted ? "UNMUTE" : "MUTE AUDIO";
};
document.getElementById('startBtn').onclick = () => { init(); document.getElementById('overlay').remove(); };

function loop() {
    const actx = document.getElementById('audioCanvas').getContext('2d');
    const sctx = document.getElementById('sensorCanvas').getContext('2d');
    const fData = new Uint8Array(analyser.frequencyBinCount);
    const render = () => {
        requestAnimationFrame(render);
        analyser.getByteFrequencyData(fData);
        actx.fillStyle='#000'; actx.fillRect(0,0,400,200);
        for(let i=0; i<fData.length; i++) {
            let h = (fData[i]/255)*200;
            actx.fillStyle = `hsl(${200+(fData[i]/2)}, 100%, 50%)`;
            actx.fillRect(i*2, 200-h, 2, h);
        }
        sctx.fillStyle='#000'; sctx.fillRect(0,0,400,200);
        const drawS = (data, col) => {
            sctx.beginPath(); sctx.strokeStyle=col; sctx.lineWidth=2;
            for(let i=0; i<200; i++) {
                let y = 100 - (data[i]*40);
                if(i===0) sctx.moveTo(i*2, y); else sctx.lineTo(i*2, y);
            }
            sctx.stroke();
        };
        drawS(sHistRaw, '#ff4d4d'); drawS(sHistFilt, '#58a6ff');
    };
    render();
}
</script>
</body>
</html>
