<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Signal Filter Simulator</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #ddd; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #2a2a2a; padding: 20px; border-radius: 12px; width: 90%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        canvas { width: 100%; height: 200px; background: #000; border-radius: 8px; margin-bottom: 20px; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .control-group { background: #333; padding: 10px; border-radius: 6px; display: flex; flex-direction: column; }
        label { font-size: 0.8rem; color: #03dac6; margin-bottom: 5px; font-weight: bold; }
        select, input { background: #444; color: white; border: 1px solid #555; padding: 8px; border-radius: 4px; }
        button { grid-column: 1 / -1; padding: 15px; background: #bb86fc; color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .val { font-family: monospace; color: #aaa; float: right; }
    </style>
</head>
<body>

<div class="container">
    <h2>Signal Filter Simulation (Custom Logic)</h2>
    <canvas id="visualizer"></canvas>
    
    <div class="controls">
        <button id="startBtn">START AUDIO ENGINE</button>

        <div class="control-group">
            <label>Filter Implementation</label>
            <select id="filterSelect">
                <option value="none">None (Raw Noise)</option>
                <option value="mavg">Moving Average (n)</option>
                <option value="lpass">Low Pass (alpha)</option>
                <option value="hpass">High Pass (alpha)</option>
                <option value="bpass">Band Pass (low/high alpha)</option>
                <option value="notch">Notch (low/high alpha)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Primary Alpha / N <span id="alpha1Val" class="val">0.1</span></label>
            <input type="range" id="param1" min="0.001" max="1" step="0.001" value="0.1">
        </div>

        <div class="control-group" id="secondaryControl" style="display:none;">
            <label>Secondary Alpha <span id="alpha2Val" class="val">0.5</span></label>
            <input type="range" id="param2" min="0.001" max="1" step="0.001" value="0.5">
        </div>

        <div class="control-group">
            <label>Interference Freq <span id="intVal" class="val">440</span> Hz</label>
            <input type="range" id="intFreq" min="20" max="2000" value="440">
        </div>
        
        <div class="control-group">
            <label>Noise Level</label>
            <input type="range" id="noiseLevel" min="0" max="0.5" step="0.01" value="0.1">
        </div>
    </div>
</div>

<script>
/** * PORTED PYTHON LOGIC 
 */
class LowPass {
    constructor(alpha = 0.1) {
        this.alpha = alpha;
        this.lastValue = 0;
    }
    calc(value) {
        let result = (1 - this.alpha) * this.lastValue + this.alpha * value;
        this.lastValue = result;
        return result;
    }
}

class HighPass {
    constructor(alpha = 0.1) {
        this.lpf = new LowPass(alpha);
    }
    calc(value) {
        let lpfVal = this.lpf.calc(value);
        return value - lpfVal;
    }
}

class MovingAverage {
    constructor(n = 10) {
        this.n = Math.round(n);
        this.buffer = [];
    }
    calc(value) {
        this.buffer.push(value);
        if (this.buffer.length > this.n) this.buffer.shift();
        let sum = this.buffer.reduce((a, b) => a + b, 0);
        return sum / this.buffer.length;
    }
}

class BandPass {
    constructor(lowAlpha, highAlpha) {
        this.lpf = new LowPass(lowAlpha);
        this.hpf = new HighPass(highAlpha);
    }
    calc(value) {
        let val = this.lpf.calc(value);
        return this.hpf.calc(val);
    }
}

class Notch {
    constructor(lowAlpha, highAlpha) {
        this.bpf = new BandPass(lowAlpha, highAlpha);
    }
    calc(value) {
        return value - this.bpf.calc(value);
    }
}

// Global state for the audio thread
let currentFilter = null;
let audioCtx, analyser, scriptNode, osc, noiseGain;

function setupAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Noise Generation
    const bufferSize = 4096;
    const noiseNode = audioCtx.createScriptProcessor(bufferSize, 1, 1);
    
    // Interference (Sine Wave)
    osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(440, audioCtx.currentTime);
    const oscGain = audioCtx.createGain();
    oscGain.gain.value = 0.1;
    
    noiseGain = audioCtx.createGain();
    noiseGain.gain.value = 0.1;

    analyser = audioCtx.createAnalyser();
    
    // The Processor: This is where we apply your Python logic
    noiseNode.onaudioprocess = function(e) {
        let input = e.inputBuffer.getChannelData(0);
        let output = e.outputBuffer.getChannelData(0);
        
        for (let i = 0; i < input.length; i++) {
            // Add Random Noise
            let rawSample = (Math.random() * 2 - 1) * noiseGain.gain.value + input[i];
            
            // Apply Logic
            if (currentFilter) {
                output[i] = currentFilter.calc(rawSample);
            } else {
                output[i] = rawSample;
            }
        }
    };

    osc.connect(oscGain);
    oscGain.connect(noiseNode);
    noiseNode.connect(analyser);
    analyser.connect(audioCtx.destination);
    
    osc.start();
    draw();
}

// UI Handling
const filterSelect = document.getElementById('filterSelect');
const param1 = document.getElementById('param1');
const param2 = document.getElementById('param2');
const secControl = document.getElementById('secondaryControl');

function updateFilter() {
    const type = filterSelect.value;
    const p1 = parseFloat(param1.value);
    const p2 = parseFloat(param2.value);
    
    document.getElementById('alpha1Val').textContent = p1;
    document.getElementById('alpha2Val').textContent = p2;

    if (type === 'mavg') {
        currentFilter = new MovingAverage(p1 * 100); // Scale 0-1 to 0-100 samples
        document.getElementById('alpha1Val').textContent = Math.round(p1 * 100);
        secControl.style.display = 'none';
    } else if (type === 'lpass') {
        currentFilter = new LowPass(p1);
        secControl.style.display = 'none';
    } else if (type === 'hpass') {
        currentFilter = new HighPass(p1);
        secControl.style.display = 'none';
    } else if (type === 'bpass') {
        currentFilter = new BandPass(p1, p2);
        secControl.style.display = 'block';
    } else if (type === 'notch') {
        currentFilter = new Notch(p1, p2);
        secControl.style.display = 'block';
    } else {
        currentFilter = null;
        secControl.style.display = 'none';
    }
}

filterSelect.onchange = updateFilter;
param1.oninput = updateFilter;
param2.oninput = updateFilter;
document.getElementById('intFreq').oninput = (e) => {
    if(osc) osc.frequency.value = e.target.value;
    document.getElementById('intVal').textContent = e.target.value;
};
document.getElementById('noiseLevel').oninput = (e) => {
    if(noiseGain) noiseGain.gain.value = e.target.value;
};

document.getElementById('startBtn').onclick = function() {
    if (!audioCtx) setupAudio();
    audioCtx.resume();
    this.style.display = 'none';
};

function draw() {
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);

    function render() {
        requestAnimationFrame(render);
        analyser.getByteFrequencyData(dataArray);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        let barWidth = (canvas.width / bufferLength) * 2.5;
        let x = 0;
        for (let i = 0; i < bufferLength; i++) {
            let barHeight = dataArray[i];
            ctx.fillStyle = `hsl(${280 - barHeight}, 100%, 50%)`;
            ctx.fillRect(x, canvas.height - barHeight / 2, barWidth, barHeight / 2);
            x += barWidth + 1;
        }
    }
    render();
}
</script>
</body>
</html>
