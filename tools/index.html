<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Lab Pro - Vertical Telemetry</title>
    <style>
        :root {
            --bg: #0b1016; --card: #151b23; --accent: #00f2ff;
            --text: #e1e4e8; --border: #30363d; --raw: #ff4757; --filt: #2ed573; --bypass: #ffa502;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }

        .container { max-width: 1300px; margin: 0 auto; }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }

        h2 { margin: 0 0 20px 0; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; color: #8b949e; border-bottom: 1px solid var(--border); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        .grid { display: grid; grid-template-columns: 1fr 420px; gap: 30px; }
        canvas { width: 100%; height: 220px; background: #05070a; border-radius: 8px; border: 1px solid #1f242c; display: block; }

        /* TELEMETRY - UPDATED TO VERTICAL STACK */
        .telemetry-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .tel-card { background: #05070a; border-radius: 8px; padding: 12px 20px; border-left: 6px solid #ccc; }
        .tel-card.raw { border-color: var(--raw); }
        .tel-card.filt { border-color: var(--filt); }
        .tel-label { font-size: 0.65rem; font-weight: bold; color: #8b949e; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .tel-value { font-family: 'Courier New', monospace; font-size: 2.8rem; font-weight: 900; color: #fff; line-height: 1; }

        /* PIPELINE */
        .pipeline { display: flex; flex-direction: column; gap: 10px; max-height: 600px; overflow-y: auto; padding-right: 8px; }
        .node { background: #1c2128; border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
        .node-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .node-title { font-size: 0.7rem; font-weight: 900; color: var(--accent); }

        /* CONTROLS */
        .control-group { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .label-xs { font-size: 0.65rem; color: #8b949e; width: 75px; flex-shrink: 0; font-weight: bold; }
        .num-box { display: flex; align-items: center; background: #000; border-radius: 4px; border: 1px solid var(--border); overflow: hidden; }
        .num-box input { width: 55px; background: none; border: none; color: #fff; text-align: center; padding: 4px; font-family: monospace; font-size: 0.85rem; }
        .num-box button { background: #30363d; border: none; color: white; padding: 4px 10px; cursor: pointer; font-weight: bold; }

        .btn { cursor: pointer; border-radius: 6px; font-weight: bold; border: none; font-size: 0.7rem; padding: 6px 12px; transition: 0.2s; }
        .btn-add { width: 100%; background: #238636; color: white; margin-top: 10px; padding: 12px; font-size: 0.8rem; }
        .btn-order { background: #30363d; color: #fff; padding: 2px 10px; }
        .btn-order:hover { background: var(--accent); color: #000; }
        .btn-bypass { background: #30363d; color: #fff; }
        .btn-bypass.active { background: var(--bypass); color: #000; }
        .btn-mute { background: #30363d; color: #fff; }
        .btn-mute.active { background: var(--raw); }

        .scale-box { display: flex; gap: 10px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }

        input[type="range"] { flex: 1; accent-color: var(--accent); cursor: pointer; }
        select { background: #0d1117; color: white; border: 1px solid var(--border); border-radius: 4px; padding: 4px; font-size: 0.75rem; flex: 1; }

        #overlay { position: fixed; inset: 0; background: #05070a; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #startBtn { padding: 20px 60px; background: var(--accent); color: #000; font-size: 1.2rem; font-weight: 800; border-radius: 50px; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="letter-spacing: 8px; margin-bottom: 30px; font-weight: 900;">SIGNAL LAB PRO</h1>
    <button id="startBtn">START ENGINE</button>
</div>

<div class="container">
    <div class="section">
        <h2>
            AUDIO PIPELINE
            <div style="display:flex; gap:10px">
                <button class="btn btn-bypass" id="audioBypassBtn" onclick="toggleBypass('audio')">BYPASS ALL</button>
                <button class="btn btn-mute" id="audioMute">MUTE AUDIO</button>
            </div>
        </h2>
        <div class="grid">
            <div class="vis">
                <canvas id="audioCanvas"></canvas>
                <div style="margin-top:20px; display:flex; flex-direction:column; gap:8px;">
                    <div class="control-group"><span class="label-xs">Frequency</span> <input type="range" id="intFreq" min="20" max="2000" value="440" oninput="syncGlobal('intFreq', this.value)"> <div class="num-box"><button onclick="spinGlobal('intFreq', -10)">-</button><input type="number" id="intFreqNum" value="440" oninput="syncGlobal('intFreq', this.value)"><button onclick="spinGlobal('intFreq', 10)">+</button></div></div>
                    <div class="control-group"><span class="label-xs">Sine Gain</span> <input type="range" id="intAmp" min="0" max="1" step="0.01" value="0.2" oninput="syncGlobal('intAmp', this.value)"> <div class="num-box"><button onclick="spinGlobal('intAmp', -0.05)">-</button><input type="number" id="intAmpNum" value="0.2" oninput="syncGlobal('intAmp', this.value)"><button onclick="spinGlobal('intAmp', 0.05)">+</button></div></div>
                    <div class="control-group"><span class="label-xs">White Noise</span> <input type="range" id="audioNoise" min="0" max="1" step="0.01" value="0.05" oninput="syncGlobal('audioNoise', this.value)"> <div class="num-box"><button onclick="spinGlobal('audioNoise', -0.01)">-</button><input type="number" id="audioNoiseNum" value="0.05" oninput="syncGlobal('audioNoise', this.value)"><button onclick="spinGlobal('audioNoise', 0.01)">+</button></div></div>
                </div>
            </div>
            <div class="pipeline-container">
                <div class="pipeline" id="audioNodes"></div>
                <button class="btn btn-add" onclick="addNode('audio')">+ ADD PROCESSING STAGE</button>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>SENSOR TELEMETRY <button class="btn btn-bypass" id="sensorBypassBtn" onclick="toggleBypass('sensor')">BYPASS ALL</button></h2>
        <div class="grid">
            <div class="vis">
                <div class="telemetry-grid">
                    <div class="tel-card raw"><span class="tel-label">Raw Signal</span><span class="tel-value" id="valRaw">0.000</span></div>
                    <div class="tel-card filt"><span class="tel-label">Filtered Data</span><span class="tel-value" id="valFilt">0.000</span></div>
                </div>

                <canvas id="sensorCanvas"></canvas>

                <div style="margin-top:20px; display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div style="display:flex; flex-direction:column; gap:8px;">
                        <div class="control-group"><span class="label-xs">Signal Amp</span> <input type="range" id="sensorAmp" min="0" max="2" step="0.01" value="0.8" oninput="syncGlobal('sensorAmp', this.value)"> <div class="num-box"><button onclick="spinGlobal('sensorAmp', -0.1)">-</button><input type="number" id="sensorAmpNum" value="0.8" oninput="syncGlobal('sensorAmp', this.value)"><button onclick="spinGlobal('sensorAmp', 0.1)">+</button></div></div>
                        <div class="control-group"><span class="label-xs">Jitter Lvl</span> <input type="range" id="sensorNoise" min="0" max="2" step="0.01" value="0.3" oninput="syncGlobal('sensorNoise', this.value)"> <div class="num-box"><button onclick="spinGlobal('sensorNoise', -0.05)">-</button><input type="number" id="sensorNoiseNum" value="0.3" oninput="syncGlobal('sensorNoise', this.value)"><button onclick="spinGlobal('sensorNoise', 0.05)">+</button></div></div>
                        <div class="control-group"><span class="label-xs">Sim Speed</span> <input type="range" id="simSpeed" min="1" max="100" value="25" oninput="syncGlobal('simSpeed', this.value)"> <div class="num-box"><button onclick="spinGlobal('simSpeed', -1)">-</button><input type="number" id="simSpeedNum" value="25" oninput="syncGlobal('simSpeed', this.value)"><button onclick="spinGlobal('simSpeed', 1)">+</button></div></div>
                    </div>

                    <div class="scale-box">
                        <div style="flex:1">
                            <span class="tel-label">Graph Max</span>
                            <div class="num-box" style="width:100%"><button onclick="spinGlobal('gMax', -0.5)">-</button><input type="number" id="gMaxNum" value="2.0" step="0.1" oninput="syncGlobal('gMax', this.value)"><button onclick="spinGlobal('gMax', 0.5)">+</button></div>
                        </div>
                        <div style="flex:1">
                            <span class="tel-label">Graph Min</span>
                            <div class="num-box" style="width:100%"><button onclick="spinGlobal('gMin', -0.5)">-</button><input type="number" id="gMinNum" value="-2.0" step="0.1" oninput="syncGlobal('gMin', this.value)"><button onclick="spinGlobal('gMin', 0.5)">+</button></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="pipeline-container">
                <div class="pipeline" id="sensorNodes"></div>
                <button class="btn btn-add" onclick="addNode('sensor')">+ ADD FILTER STAGE</button>
            </div>
        </div>
    </div>
</div>

<script>
/** * PYTHON FILTERS (Filters.py logic)
 */
class Filter { constructor() { this._l = 0; } calc(v) { this._l = v; return v; } last() { return this._l; } }
class MovingAverage extends Filter {
    constructor(n=10) { super(); this._n=Math.max(1, Math.round(n)); this._v=[]; }
    calc(v) { this._v.push(v); if(this._v.length>this._n) this._v.shift(); const r=this._v.reduce((a,b)=>a+b,0)/this._v.length; super.calc(r); return r; }
}
class LowPass extends Filter {
    constructor(a=0.1) { super(); this._a=a; }
    calc(v) { const r=(1-this._a)*this.last()+this._a*v; super.calc(r); return r; }
}
class HighPass extends Filter {
    constructor(a=0.1) { super(); this._lp=new LowPass(a); }
    calc(v) { const r=v-this._lp.calc(v); super.calc(r); return r; }
}
class BandPass extends Filter {
    constructor(la=0.1, ha=0.5) { super(); this._lp=new LowPass(la); this._hp=new HighPass(ha); }
    calc(v) { const r=this._hp.calc(this._lp.calc(v)); super.calc(r); return r; }
}
class Notch extends Filter {
    constructor(la=0.1, ha=0.5) { super(); this._bp=new BandPass(la, ha); }
    calc(v) { const r=v-this._bp.calc(v); super.calc(r); return r; }
}
class HighCut extends Filter { constructor(c=0.1) { super(); this._c=c; } calc(v) { const r=Math.min(this._c, v); super.calc(r); return r; } }
class LowCut extends Filter { constructor(c=0.1) { super(); this._c=c; } calc(v) { const r=Math.max(this._c, v); super.calc(r); return r; } }

// --- ENGINE ---
let audioCtx, analyser, isMuted=false, phase=0;
let audioChain=[], sensorChain=[], audioBypass=false, sensorBypass=false;
let sRawHist=new Array(200).fill(0), sFiltHist=new Array(200).fill(0);
let lastRaw=0, lastFilt=0, updateDisp=false;

function init() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    const proc = audioCtx.createScriptProcessor(2048, 1, 1);

    proc.onaudioprocess = (e) => {
        const out = e.outputBuffer.getChannelData(0);
        const aFreq = parseFloat(document.getElementById('intFreqNum').value);
        const aAmp = parseFloat(document.getElementById('intAmpNum').value);
        const aNoise = parseFloat(document.getElementById('audioNoiseNum').value);
        const sAmp = parseFloat(document.getElementById('sensorAmpNum').value);
        const sNoise = parseFloat(document.getElementById('sensorNoiseNum').value);
        const speed = Math.max(0.1, parseFloat(document.getElementById('simSpeedNum').value));
        const pStep = (2 * Math.PI * aFreq) / audioCtx.sampleRate;

        for (let i = 0; i < out.length; i++) {
            let aS = (Math.sin(phase) * aAmp) + ((Math.random()*2-1)*aNoise);
            phase += pStep; if(phase > Math.PI*2) phase -= Math.PI*2;
            if(!audioBypass) audioChain.forEach(n => { if(n.inst) aS = n.inst.calc(aS); });
            out[i] = isMuted ? 0 : aS;

            if(i % (Math.floor(2048 / (speed * 0.5)) || 1) === 0) {
                lastRaw = (Math.sin(Date.now()/700) * sAmp) + (Math.random()*2-1)*sNoise;
                lastFilt = lastRaw;
                if(!sensorBypass) sensorChain.forEach(n => { if(n.inst) lastFilt = n.inst.calc(lastFilt); });
                sRawHist.push(lastRaw); sRawHist.shift();
                sFiltHist.push(lastFilt); sFiltHist.shift();
                updateDisp = true;
            }
        }
    };
    proc.connect(analyser); analyser.connect(audioCtx.destination);
    loop();
}

// --- UI SYNC ---
function syncGlobal(id, val) {
    const s = document.getElementById(id);
    const n = document.getElementById(id + 'Num');
    if(s) s.value = val;
    if(n) n.value = val;
}
function spinGlobal(id, delta) {
    const n = document.getElementById(id + 'Num');
    syncGlobal(id, (parseFloat(n.value) + delta).toFixed(2));
}
function toggleBypass(type) {
    if(type === 'audio') audioBypass = !audioBypass;
    else sensorBypass = !sensorBypass;
    document.getElementById(type + 'BypassBtn').classList.toggle('active');
}

// --- PIPELINE MGMT ---
const MODS = {
    lpass: { cls: LowPass, params: [{l:'Alpha', k:0}] },
    hpass: { cls: HighPass, params: [{l:'Alpha', k:0}] },
    mavg:  { cls: MovingAverage, params: [{l:'Window', k:0, scale: 100}] },
    hcut:  { cls: HighCut, params: [{l:'Cut Value', k:0}] },
    lcut:  { cls: LowCut, params: [{l:'Cut Value', k:0}] },
    bpass: { cls: BandPass, params: [{l:'Low α', k:0}, {l:'High α', k:1}] },
    notch: { cls: Notch, params: [{l:'Low α', k:0}, {l:'High α', k:1}] }
};

function addNode(target) {
    const c = (target === 'audio') ? audioChain : sensorChain;
    c.push({ id: Date.now(), type: 'lpass', p: [0.1, 0.5], inst: new LowPass(0.1) });
    renderPipeline(target);
}

function updateNode(target, id, type, pIdx, val) {
    const c = (target === 'audio') ? audioChain : sensorChain;
    const n = c.find(x => x.id === id);
    if(type) n.type = type;
    if(val !== undefined) n.p[pIdx] = parseFloat(val);

    const cfg = MODS[n.type];
    const args = cfg.params.map(p => p.scale ? n.p[p.k] * p.scale : n.p[p.k]);
    n.inst = new cfg.cls(...args);
    if(type) renderPipeline(target);
}

function moveNode(target, id, dir) {
    const c = (target === 'audio') ? audioChain : sensorChain;
    const i = c.findIndex(x => x.id === id);
    if(dir === -1 && i > 0) [c[i], c[i-1]] = [c[i-1], c[i]];
    if(dir === 1 && i < c.length-1) [c[i], c[i+1]] = [c[i+1], c[i]];
    renderPipeline(target);
}

function removeNode(target, id) {
    if(target === 'audio') audioChain = audioChain.filter(x => x.id !== id);
    else sensorChain = sensorChain.filter(x => x.id !== id);
    renderPipeline(target);
}

function renderPipeline(target) {
    const c = (target === 'audio') ? audioChain : sensorChain;
    const cont = document.getElementById(target + 'Nodes');
    cont.innerHTML = '';
    c.forEach((n, idx) => {
        const cfg = MODS[n.type];
        const div = document.createElement('div');
        div.className = 'node';
        div.innerHTML = `
            <div class="node-top">
                <span class="node-title">${idx+1}. ${n.type.toUpperCase()}</span>
                <div style="display:flex; gap:4px">
                    <button class="btn btn-order" onclick="moveNode('${target}', ${n.id}, -1)">↑</button>
                    <button class="btn btn-order" onclick="moveNode('${target}', ${n.id}, 1)">↓</button>
                    <button class="btn" style="background:#444" onclick="removeNode('${target}', ${n.id})">✕</button>
                </div>
            </div>
            <select style="margin-bottom:10px; width:100%" onchange="updateNode('${target}', ${n.id}, this.value)">
                ${Object.keys(MODS).map(k => `<option value="${k}" ${n.type===k?'selected':''}>${k}</option>`).join('')}
            </select>
            ${cfg.params.map(p => `
                <div class="control-group">
                    <span class="label-xs">${p.l}</span>
                    <input type="range" min="0" max="1" step="0.01" value="${n.p[p.k]}" oninput="this.nextElementSibling.querySelector('input').value=this.value; updateNode('${target}', ${n.id}, null, ${p.k}, this.value)">
                    <div class="num-box">
                        <button onclick="let i=this.nextElementSibling; i.value=(parseFloat(i.value)-0.05).toFixed(2); updateNode('${target}', ${n.id}, null, ${p.k}, i.value)">-</button>
                        <input type="number" value="${n.p[p.k]}" step="0.01" oninput="updateNode('${target}', ${n.id}, null, ${p.k}, this.value)">
                        <button onclick="let i=this.previousElementSibling; i.value=(parseFloat(i.value)+0.05).toFixed(2); updateNode('${target}', ${n.id}, null, ${p.k}, i.value)">+</button>
                    </div>
                </div>
            `).join('')}
        `;
        cont.appendChild(div);
    });
}

// --- RENDER ---
document.getElementById('audioMute').onclick = function() {
    isMuted = !isMuted; this.classList.toggle('active');
    this.innerText = isMuted ? "UNMUTE" : "MUTE AUDIO";
};
document.getElementById('startBtn').onclick = () => { init(); document.getElementById('overlay').remove(); };

function loop() {
    const actx = document.getElementById('audioCanvas').getContext('2d');
    const sctx = document.getElementById('sensorCanvas').getContext('2d');
    const fData = new Uint8Array(analyser.frequencyBinCount);

    const render = () => {
        requestAnimationFrame(render);
        if(updateDisp) {
            document.getElementById('valRaw').innerText = lastRaw.toFixed(3);
            document.getElementById('valFilt').innerText = lastFilt.toFixed(3);
            updateDisp = false;
        }

        // Spectrum
        analyser.getByteFrequencyData(fData);
        actx.fillStyle='#05070a'; actx.fillRect(0,0,800,220);
        for(let i=0; i<fData.length; i++) {
            let h = (fData[i]/255)*200;
            actx.fillStyle = `hsl(${190+(fData[i]/3)}, 100%, 50%)`;
            actx.fillRect(i*3, 220-h, 2, h);
        }

        // Sensor Graph
        const gMax = parseFloat(document.getElementById('gMaxNum').value);
        const gMin = parseFloat(document.getElementById('gMinNum').value);
        const range = gMax - gMin;

        sctx.fillStyle='#05070a'; sctx.fillRect(0,0,400,220);

        if (gMin < 0 && gMax > 0) {
            const zeroY = 220 - ((0 - gMin) / range * 220);
            sctx.strokeStyle='#1f242c'; sctx.beginPath(); sctx.moveTo(0, zeroY); sctx.lineTo(400, zeroY); sctx.stroke();
        }

        const draw = (data, col, width) => {
            sctx.beginPath(); sctx.strokeStyle=col; sctx.lineWidth=width;
            for(let i=0; i<200; i++) {
                let y = 220 - ((data[i] - gMin) / range * 220);
                if(i===0) sctx.moveTo(i*2, y); else sctx.lineTo(i*2, y);
            }
            sctx.stroke();
        };
        draw(sRawHist, '#ff4757', 1);
        draw(sFiltHist, '#2ed573', 2.5);
    };
    render();
}
</script>
</body>
</html>
