name: CI

on:
  pull_request:
  push:
    branches:
      - master

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # - run: |
      #     sudo apt update
      #     sudo apt upgrade -y
      #     sudo apt install -y python3 python3-pip
      - name: setup env
        run: |
          /bin/bash .devcontainer/setup_devcontainer.sh
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
      - name: run pre-commit
        run: |
          pre-commit run --all-files
      - name: run tests
        run:
          python3 -m pytest
